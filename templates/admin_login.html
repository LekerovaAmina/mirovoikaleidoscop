{% extends 'base.html' %}
{% block title %}Вход — Мировой калейдоскоп{% endblock %}
{% block head %}
<style>
  body {
    background: linear-gradient(135deg, #FF6B00 0%, #FFB800 50%, #FF9A3C 100%);
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    overflow: hidden;
  }
  .bg-orbs {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .orb {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,0.12);
    animation: float 8s ease-in-out infinite;
  }
  .orb:nth-child(1) { width:300px;height:300px;top:-80px;left:-80px;animation-delay:0s; }
  .orb:nth-child(2) { width:200px;height:200px;bottom:20px;right:-60px;animation-delay:2s; }
  .orb:nth-child(3) { width:150px;height:150px;top:40%;right:10%;animation-delay:4s; }
  @keyframes float {
    0%,100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-20px) scale(1.05); }
  }
  .card {
    background: rgba(255,255,255,0.95);
    border-radius: 28px;
    padding: 48px 40px;
    width: 380px;
    box-shadow: 0 24px 80px rgba(100,30,0,0.25);
    position: relative; z-index: 1;
    animation: cardIn .6s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes cardIn {
    from { opacity:0; transform:translateY(40px) scale(.9); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }
  .logo {
    text-align: center; margin-bottom: 32px;
  }
  .logo-icon {
    font-size: 52px; display: block; margin-bottom: 8px;
    animation: spin 20s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .logo h1 {
    font-size: 1.6rem; color: var(--orange);
    line-height: 1.2;
  }
  .logo p {
    font-size: .85rem; color: var(--gray); margin-top:4px;
  }
  .form-group { margin-bottom: 20px; }
  label {
    display: block; font-weight: 700; font-size: .85rem;
    color: var(--gray); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .05em;
  }
  input[type=password] {
    width: 100%; padding: 14px 18px;
    border: 2px solid var(--orange-mid);
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    background: var(--orange-pale);
    color: var(--dark);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input[type=password]:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 4px rgba(255,107,0,0.15);
  }
  .btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, var(--orange), var(--gold));
    color: white; border: none; border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 1.05rem; font-weight: 800;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 6px 24px rgba(255,107,0,0.4);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(255,107,0,0.5); }
  .btn:active { transform: translateY(0); }
  .error {
    background: #FFF0F0; border: 1.5px solid #FFB0B0;
    color: #C00; padding: 10px 14px;
    border-radius: 10px; font-size: .88rem;
    margin-bottom: 16px; text-align: center;
  }
</style>
{% endblock %}
{% block body %}
<div class="bg-orbs">
  <div class="orb"></div><div class="orb"></div><div class="orb"></div>
</div>
<div class="card">
  <div class="logo">
    <span class="logo-icon">🌍</span>
    <h1>Мировой<br>калейдоскоп</h1>
    <p>Панель администратора</p>
  </div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST" action="/admin/auth">
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" name="password" placeholder="Введите пароль..." autofocus>
    </div>
    <button type="submit" class="btn">Войти →</button>
  </form>
</div>
{% endblock %}
